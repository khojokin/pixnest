<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixNest | Payment</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    :root{
      --bg:#0f172a;
      --panel:#111827;
      --panel2:#1e293b;
      --text:#e5e7eb;
      --muted:#94a3b8;
      --accent:#facc15;
      --line:rgba(255,255,255,0.08);
      --blue:#3b82f6;
      --danger:#ef4444;
    }

    body{
      min-height:100vh;
      background:var(--bg);
      color:var(--text);
      line-height:1.6;
      overflow-x:hidden;
    }

    a{
      text-decoration:none;
      color:inherit;
      transition:.3s;
    }

    .container{
      width:min(720px,92%);
      margin:auto;
    }

    header{
      position:sticky;
      top:0;
      z-index:1000;
      background:rgba(15,23,42,0.95);
      border-bottom:1px solid var(--line);
      backdrop-filter:blur(8px);
    }

    .nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      padding:16px 0;
    }

    .logo-wrap{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .logo-mark{
      width:52px;
      height:52px;
      border-radius:14px;
      background:linear-gradient(135deg,#facc15,#fb7185);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#111827;
      font-size:24px;
      font-weight:800;
      box-shadow:0 0 16px rgba(250,204,21,0.28);
      flex-shrink:0;
    }

    .logo-title{
      font-size:27px;
      font-weight:800;
      color:var(--accent);
      letter-spacing:.4px;
    }

    .logo-sub{
      font-size:11px;
      color:#cbd5e1;
      letter-spacing:1.6px;
      text-transform:uppercase;
      margin-top:3px;
      display:block;
    }

    main{
      padding:56px 0 72px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:28px;
      padding:28px;
      box-shadow:0 24px 60px rgba(2,6,23,.36);
    }

    .tag{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(250,204,21,.12);
      border:1px solid rgba(250,204,21,.18);
      color:#fde68a;
      font-size:13px;
      font-weight:700;
      margin-bottom:16px;
    }

    h1{
      font-size:40px;
      line-height:1.1;
      margin-bottom:12px;
    }

    p{
      color:#cbd5e1;
    }

    .summary{
      margin-top:24px;
      display:grid;
      gap:12px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      padding:14px 16px;
      border-radius:16px;
      background:#0f172a;
      border:1px solid var(--line);
    }

    .row strong{
      color:#fff;
      font-size:14px;
    }

    .row span{
      color:#cbd5e1;
      font-size:14px;
      text-align:right;
    }

    .notice{
      margin-top:18px;
      padding:16px;
      border-radius:16px;
      background:rgba(59,130,246,.08);
      border:1px solid rgba(59,130,246,.16);
      color:#dbeafe;
      font-size:14px;
    }

    .warning{
      background:rgba(239,68,68,.08);
      border-color:rgba(239,68,68,.18);
      color:#fecaca;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:22px;
    }

    .btn{
      min-height:52px;
      padding:0 18px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:transparent;
      color:#fff;
      font-weight:800;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      cursor:pointer;
    }

    .btn.primary{
      background:#facc15;
      color:#111827;
      border:none;
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    @media(max-width:640px){
      h1{font-size:32px;}
      .logo-title{font-size:22px;}
      .logo-sub{font-size:10px;}
      .actions{flex-direction:column;}
      .btn{width:100%;}
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <a href="index.html" class="logo-wrap">
        <span class="logo-mark">P</span>
        <span>
          <span class="logo-title">PixNest</span>
          <span class="logo-sub">Photo Collection Site</span>
        </span>
      </a>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="card">
        <div class="tag"><i class="fa-solid fa-lock"></i> Secure payment</div>
        <h1 id="pageTitle">Preparing your checkout…</h1>
        <p id="pageText">Please wait while we send you to the right payment step.</p>

        <div class="summary" id="summary"></div>

        <div class="notice" id="noticeBox">
          Premium membership payments continue on Stripe’s secure checkout page. Your card details are handled there, not on this page.
        </div>

        <div class="actions">
          <a class="btn primary" id="primaryAction" href="checkout.html?plan=monthly">
            <i class="fa-solid fa-arrow-right"></i>
            Continue
          </a>
          <a class="btn" href="premiumplans.html">
            <i class="fa-solid fa-crown"></i>
            View Plans
          </a>
          <a class="btn" href="index.html">
            <i class="fa-solid fa-house"></i>
            Home
          </a>
        </div>
      </section>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const plan = String(params.get("plan") || "").toLowerCase();
    const intent = String(params.get("intent") || "").toLowerCase();
    const rawPrice = params.get("price") || "";

    const pageTitle = document.getElementById("pageTitle");
    const pageText = document.getElementById("pageText");
    const summary = document.getElementById("summary");
    const noticeBox = document.getElementById("noticeBox");
    const primaryAction = document.getElementById("primaryAction");

    function row(label, value){
      const div = document.createElement("div");
      div.className = "row";
      div.innerHTML = `<strong>${label}</strong><span>${value}</span>`;
      return div;
    }

    function safePrice(value){
      if(!value) return "Shown at checkout";
      return /^£/.test(value) ? value : `£${value}`;
    }

    if(plan === "premium" || plan === "monthly" || plan === "yearly"){
      const normalizedPlan = plan === "premium" ? "monthly" : plan;
      const labels = {
        monthly: ["Premium Monthly", "Every month", "£9.99"],
        yearly: ["Premium Yearly", "Every year", "£89.99"]
      };
      const selected = labels[normalizedPlan];

      pageTitle.textContent = "Redirecting to secure premium checkout…";
      pageText.textContent = "Your billing terms stay visible on the checkout page before you continue to Stripe.";
      summary.appendChild(row("Plan", selected[0]));
      summary.appendChild(row("Billing", selected[1]));
      summary.appendChild(row("Total", selected[2]));
      primaryAction.href = `checkout.html?plan=${normalizedPlan}`;
      primaryAction.innerHTML = '<i class="fa-solid fa-arrow-right"></i> Open Checkout';

      setTimeout(() => {
        window.location.href = primaryAction.href;
      }, 900);
    } else if(intent === "buy-photo"){
      pageTitle.textContent = "Photo licence payment";
      pageText.textContent = "This route is ready for your photo payment flow, but the one-time checkout session still needs to be connected in your backend.";
      summary.appendChild(row("Purchase type", "Locked photo licence"));
      summary.appendChild(row("Price", safePrice(rawPrice)));
      summary.appendChild(row("Access", "One-time paid licence"));
      noticeBox.classList.add("warning");
      noticeBox.textContent = "This page now loads correctly, but the dedicated photo checkout logic still needs to be wired into your payment function.";
      primaryAction.href = "contact.html";
      primaryAction.innerHTML = '<i class="fa-solid fa-envelope"></i> Contact Support';
    } else if(intent === "boost-views"){
      pageTitle.textContent = "Boost views payment";
      pageText.textContent = "This route is ready for your boost purchase flow, but the checkout session for this feature still needs to be connected.";
      summary.appendChild(row("Purchase type", "Boost views"));
      summary.appendChild(row("Status", "Needs backend payment setup"));
      noticeBox.classList.add("warning");
      noticeBox.textContent = "The page is fixed, but the boost-views payment logic still needs to be added before users can pay here.";
      primaryAction.href = "professional-dashboard.html";
      primaryAction.innerHTML = '<i class="fa-solid fa-gauge"></i> Back to Dashboard';
    } else {
      pageTitle.textContent = "Choose your payment route";
      pageText.textContent = "Select a plan to continue with secure checkout.";
      summary.appendChild(row("Available route", "Premium membership"));
      primaryAction.href = "premiumplans.html";
      primaryAction.innerHTML = '<i class="fa-solid fa-crown"></i> Choose a Plan';
    }
  </script>
</body>
</html>
